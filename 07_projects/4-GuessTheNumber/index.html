<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style ="background-color:black; color: red">
    <nav>
        <a href="/">Home</a>
        <a href="https://github.com/KSujeet07/jscourse/tree/main/07_projects/4-GuessTheNumber">Project</a>
    </nav>

    <div id="wrapper">
        <h1>Guess The Number</h1>
        <p>We have selected a random number between 1 and 100. 
            See if you can guess it in 10 turns or fewer. 
            We'll tell you if your guess was too high or too low.</p>
            <br>
    
    <form class="form">
        <label for="guessField" id="guess">
            Guess a number
        </label>
        <input type="text" id="guessField" class="guessField">
        <input type="submit" id="subt" value="submit guess" class="guessSubmit">
    </form>
    
    <div class="resultParas">
        <p> Previous Guesses: <span class="guesses"></span></p>
        <p>Guesse Remaining: <span class="lastResult">10</span></p>
        <p> <span class="lowOrHi"></span></p>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
