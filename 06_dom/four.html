<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style = "background-color: #212121 ; color : #ffffff; ">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script> 
        function addLanguage(langName){ 
            const li = document.createElement('li');
            li.innerHTML = `${langName}`
            document.querySelector('.language').appendChild(li);
        }

        addLanguage("python")
        addLanguage("typescript")

        function addOptiLanguage(langName){
            const li = document.createElement('li');
            li.appendChild(document.createTextNode(langName))
            document.querySelector('.language').appendChild(li)
        }
        addOptiLanguage("C++")

        //Edit
        const secondLang = document.querySelector("li:nth-child(2)") 
        // secondLang.innerHTML = "java"
        const newli = document.createElement('li')
        newli.textContent = "java"
        secondLang.replaceWith(newli)
        

        //edit last li

        const lastLang = document.querySelector('li:last-child')
        // lastLang.innerHTML= "Django"

        const newLastLi = document.createElement('li')
        newLastLi.textContent = "React.js"
        lastLang.replaceWith(newLastLi)

        //remove
        const secondLastLang = document.querySelector("li:nth-child(2)")
        secondLastLang.remove()

        


</script>
</html>
